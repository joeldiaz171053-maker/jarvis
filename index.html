<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Holo-OS Pro Interface</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #container { width: 100vw; height: 100vh; position: relative; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.3; }
        
        /* Sidebar Interactivo */
        #sidebar { 
            position: absolute; left: 0; top: 0; width: 220px; height: 100%; 
            background: rgba(20, 20, 20, 0.85); border-right: 2px solid #00d2ff;
            display: flex; flex-direction: column; gap: 15px; padding: 20px; z-index: 50;
            overflow-y: auto; transition: transform 0.4s ease;
        }
        
        /* Ventanas */
        .window { 
            position: absolute; width: 350px; background: rgba(0, 30, 60, 0.95); 
            border: 1px solid #00d2ff; border-radius: 15px; padding: 15px; z-index: 20;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: emerge 0.4s ease-out;
        }
        @keyframes emerge { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        .minimized { position: relative !important; width: 100% !important; height: 60px !important; background: rgba(0,50,100,0.5); font-size: 12px; }
        
        /* Buscador y Sugerencias */
        .suggestions { background: white; color: black; padding: 8px; display: none; border-radius: 5px; margin-top: 5px; }
        .mic-active { background: #ff3b30 !important; box-shadow: 0 0 15px #ff3b30; }
    </style>
</head>
<body>

<div id="container">
    <video id="video" autoplay playsinline></video>
    <div id="sidebar"><h3>Segundo Plano</h3></div>
    
    <div class="window" id="win1" style="top: 20%; left: 300px;">
        <div class="window-header">Navegador IA</div>
        <input type="text" id="searchBar" placeholder="¿Qué buscamos hoy?" style="width: 100%;">
        <div id="sugs" class="suggestions">Sugerencias: Tiempo, Noticias, IA, Programación</div>
        <button id="micBtn" style="width: 100%; margin-top:10px;">🎤 Activar Voz</button>
        <iframe src="https://es.wikipedia.org/wiki/Portal:Portada" style="width:100%; height:200px; border:none; margin-top:10px;"></iframe>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    const sidebar = document.getElementById('sidebar');
    const searchBar = document.getElementById('searchBar');
    const sugs = document.getElementById('sugs');
    const micBtn = document.getElementById('micBtn');

    // Lógica de Voz
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.onstart = () => micBtn.classList.add('mic-active');
    recognition.onend = () => micBtn.classList.remove('mic-active');
    recognition.onresult = (e) => {
        const query = e.results[0][0].transcript;
        window.open(`https://www.google.com/search?q=${query}`, '_blank');
    };
    micBtn.onclick = () => recognition.start();

    // Sugerencias
    searchBar.onfocus = () => sugs.style.display = 'block';
    searchBar.onblur = () => setTimeout(() => sugs.style.display = 'none', 300);

    // Sistema de manos (Arrastrar y Minimizar)
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });

    hands.onResults((res) => {
        if (res.multiHandLandmarks?.length > 0) {
            const index = res.multiHandLandmarks[0][8];
            const thumb = res.multiHandLandmarks[0][4];
            const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
            const px = (1 - index.x) * window.innerWidth;
            const py = index.y * window.innerHeight;

            // Arrastrar ventanas
            if (dist < 0.05) {
                const windows = document.querySelectorAll('.window');
                windows.forEach(win => {
                    const rect = win.getBoundingClientRect();
                    if (px > rect.left && px < rect.right && py > rect.top && py < rect.top + 50) {
                        win.style.left = px + 'px'; win.style.top = py + 'px';
                        // Auto-activar voz al sujetar ventana
                        if (!micBtn.classList.contains('mic-active')) recognition.start();
                    }
                });
            }
            // Minimizar a sidebar
            else if (index.x > 0.8) {
                const win = document.getElementById('win1');
                win.classList.add('minimized');
                sidebar.appendChild(win);
            }
        }
    });

    new Camera(document.getElementById('video'), { onFrame: async () => await hands.send({image: document.getElementById('video')}) }).start();
</script>
</body>
</html>
