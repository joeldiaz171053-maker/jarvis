<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio Virtual - OS Holográfico</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #video, #output { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #output { z-index: 10; pointer-events: none; }

        /* Controles */
        #control-panel { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 30; }
        .btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        
        /* Sidebar Izquierdo */
        #sidebar { position: absolute; left: 0; top: 0; width: 160px; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 15; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
        
        /* Ventanas */
        .window { position: absolute; width: 300px; background: rgba(0,50,100,0.7); backdrop-filter: blur(10px); border: 1px solid #00d2ff; border-radius: 10px; color: white; z-index: 20; padding: 10px; }
        .window.minimized { position: relative !important; width: 100% !important; height: 80px !important; background: rgba(0,100,200,0.3); }
        .window-header { cursor: move; padding-bottom: 10px; font-weight: bold; border-bottom: 1px solid #00d2ff; }
        .browser-frame { width: 100%; height: 200px; border: none; margin-top: 10px; }
        .mic-btn { width: 100%; padding: 10px; background: #ff3b30; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="output"></canvas>
        <div id="sidebar"><h3>Minimizadas</h3></div>
        <div id="control-panel">
            <button class="btn" onclick="crearVentana()">+</button>
            <button class="btn" onclick="eliminarVentana()">-</button>
        </div>
        
        <div class="window" style="top: 20%; left: 30%;">
            <div class="window-header">Navegador IA</div>
            <input type="text" id="searchIn" placeholder="Buscar..." style="width:100%">
            <button class="mic-btn" id="micBtn">🎤 Escuchar</button>
            <iframe class="browser-frame" src="https://es.wikipedia.org/wiki/Portal:Portada"></iframe>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        const sidebar = document.getElementById('sidebar');
        const micBtn = document.getElementById('micBtn');
        let activeWin = null;
        
        // Voz
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.onresult = (e) => window.open(`https://www.google.com/search?q=${e.results[0][0].transcript}`);
        micBtn.onclick = () => recognition.start();

        function crearVentana() {
            const win = document.createElement('div');
            win.className = 'window';
            win.style.top = '100px'; win.style.left = '300px';
            win.innerHTML = '<div class="window-header">Nueva Ventana</div><div>Contenido del sistema</div>';
            document.getElementById('container').appendChild(win);
        }

        function eliminarVentana() { const wins = document.querySelectorAll('.window'); if(wins.length > 1) wins[wins.length-1].remove(); }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });
        
        hands.onResults((res) => {
            const canvas = document.getElementById('output');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (res.multiHandLandmarks?.length > 0) {
                const landmarks = res.multiHandLandmarks[0];
                const thumb = landmarks[4];
                const index = landmarks[8];
                const px = window.innerWidth - (index.x * window.innerWidth);
                const py = index.y * window.innerHeight;
                
                const dist = Math.hypot((index.x - thumb.x)*window.innerWidth, (index.y - thumb.y)*window.innerHeight);

                // Dibujar cursor
                ctx.fillStyle = dist < 40 ? '#00FF00' : '#00D2FF';
                ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI*2); ctx.fill();

                // Lógica arrastrar / minimizar
                if (dist < 40) {
                    const wins = document.querySelectorAll('.window');
                    wins.forEach(w => {
                        const rect = w.getBoundingClientRect();
                        if (px > rect.left && px < rect.right && py > rect.top && py < rect.bottom) {
                            if (!activeWin) activeWin = w;
                            activeWin.style.left = (px - 50) + 'px';
                            activeWin.style.top = (py - 20) + 'px';
                        }
                    });
                } else if (activeWin && dist > 120) {
                    activeWin.classList.add('minimized');
                    sidebar.appendChild(activeWin);
                    activeWin = null;
                } else {
                    activeWin = null;
                }
            }
        });

        new Camera(document.getElementById('video'), { onFrame: async () => await hands.send({image: document.getElementById('video')}) }).start();
    </script>
</body>
</html>
