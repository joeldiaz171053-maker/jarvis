<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Holo-OS Interface</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #container { width: 100vw; height: 100vh; position: relative; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.3; }
        
        /* Sidebar Interactivo */
        #sidebar { 
            position: absolute; left: 0; top: 0; width: 200px; height: 100%; 
            background: rgba(20, 20, 20, 0.8); border-right: 1px solid #00d2ff;
            display: flex; flex-direction: column; gap: 10px; padding: 10px; z-index: 50;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Ventanas */
        .window { 
            position: absolute; width: 350px; background: rgba(0, 30, 60, 0.9); 
            border: 1px solid #00d2ff; border-radius: 15px; padding: 15px; z-index: 20;
            transition: all 0.4s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .window.minimized { position: relative; width: 100%; height: 60px; transform: scale(1); }
        
        /* Navegador y Sugerencias */
        .suggestions { background: white; color: black; padding: 5px; display: none; font-size: 12px; }
        .mic-active { box-shadow: 0 0 20px #ff3b30; border: 2px solid #ff3b30; }
    </style>
</head>
<body>

<div id="container">
    <video id="video" autoplay playsinline></video>
    <div id="sidebar"><h3>Segundo Plano</h3></div>
    
    <div class="window" id="mainWin" style="top: 20%; left: 300px;">
        <div class="window-header">Navegador IA</div>
        <input type="text" id="searchBar" placeholder="¿Qué buscamos hoy?" style="width: 100%;">
        <div id="sugs" class="suggestions">Recetas | Noticias | Clima</div>
        <button id="micBtn" class="mic-btn">🎤 Activar Voz</button>
        <iframe src="https://www.google.com/webhp?igu=1" style="width:100%; height:200px; border:none;"></iframe>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    const sidebar = document.getElementById('sidebar');
    const searchBar = document.getElementById('searchBar');
    const sugs = document.getElementById('sugs');

    // Sugerencias interactivas
    searchBar.onfocus = () => sugs.style.display = 'block';
    searchBar.onblur = () => setTimeout(() => sugs.style.display = 'none', 200);

    // Sistema de Voz
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.onstart = () => document.getElementById('micBtn').classList.add('mic-active');
    recognition.onresult = (e) => {
        const query = e.results[0][0].transcript;
        searchBar.value = query;
        window.open(`https://www.google.com/search?q=${query}`, '_blank');
        document.getElementById('micBtn').classList.remove('mic-active');
    };
    document.getElementById('micBtn').onclick = () => recognition.start();

    // Lógica de manos (simplificada para rendimiento)
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });

    hands.onResults((res) => {
        if (res.multiHandLandmarks?.length > 0) {
            const index = res.multiHandLandmarks[0][8];
            const thumb = res.multiHandLandmarks[0][4];
            const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);

            // Mover ventana principal si se hace pinza
            if (dist < 0.05) {
                const win = document.getElementById('mainWin');
                win.style.left = (1 - index.x) * window.innerWidth + 'px';
                win.style.top = index.y * window.innerHeight + 'px';
            }
            
            // Gestos laterales para sidebar
            if (index.x < 0.1 && dist > 0.15) {
                sidebar.style.transform = 'translateX(0)';
            } else if (index.x > 0.9) {
                sidebar.style.transform = 'translateX(-100%)';
            }
        }
    });

    new Camera(document.getElementById('video'), { onFrame: async () => await hands.send({image: document.getElementById('video')}) }).start();
</script>
</body>
</html>
