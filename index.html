<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio Virtual - Control Total por Gestos</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* Espejo visual para el usuario */
        #video, #output { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        #output { z-index: 10; pointer-events: none; }

        /* --- MENÚ DE CONTROL FLOTANTE (Lado Derecho) --- */
        #control-panel {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 30;
        }

        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            user-select: none;
        }

        /* Efecto cuando la mano física está "haciendo clic" en el botón */
        .btn.pressed {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }
        .btn-add { border-color: #00FF00; color: #00FF00; }
        .btn-remove { border-color: #FF3B30; color: #FF3B30; }

        /* --- ESTILO DE LAS VENTANAS FLOTANTES --- */
        .window {
            position: absolute;
            width: 280px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            z-index: 20;
            overflow: hidden;
            transition: transform 0.05s linear, border-color 0.2s;
            user-select: none;
        }

        .window.holding {
            border-color: #00FF00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            transform: scale(1.02);
            z-index: 25;
        }

        .window-header {
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .window-content {
            padding: 18px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="output"></canvas>

        <div id="control-panel">
            <button class="btn btn-add" id="addBtn">+</button>
            <button class="btn btn-remove" id="removeBtn">−</button>
        </div>

        <div class="window" style="top: 25%; left: 25%;">
            <div class="window-header">Espacio Principal</div>
            <div class="window-content">
                <p>¡Arreglado! Junta tus dedos aquí para moverme, o haz la pinza sobre los botones de la derecha.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output');
        const canvasCtx = canvasElement.getContext('2d');

        let activeHoldingWindow = null;
        let offsetX = 0;
        let offsetY = 0;
        let windowCounter = 1;
        
        // Bandera para evitar clics infinitos mientras se sostiene la pinza en un botón
        let buttonCooldown = false; 

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        // Funciones de control de ventanas
        function crearVentana() {
            windowCounter++;
            const newWin = document.createElement('div');
            newWin.className = 'window';
            const randomTop = Math.floor(Math.random() * 40) + 20;
            const randomLeft = Math.floor(Math.random() * 30) + 20;
            
            newWin.style.top = `${randomTop}%`;
            newWin.style.left = `${randomLeft}%`;
            newWin.innerHTML = `
                <div class="window-header">Ventana #${windowCounter}</div>
                <div class="window-content"><p>Nueva interfaz virtual añadida con éxito usando tus dedos.</p></div>
            `;
            document.getElementById('container').appendChild(newWin);
        }

        function eliminarVentana() {
            const windows = document.querySelectorAll('.window');
            if (windows.length > 1) {
                windows[windows.length - 1].remove();
            }
        }

        // Eventos para mouse por si acaso
        document.getElementById('addBtn').addEventListener('click', crearVentana);
        document.getElementById('removeBtn').addEventListener('click', eliminarVentana);

        // Configuración de MediaPipe
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ 
            maxNumHands: 2, 
            modelComplexity: 1, 
            minDetectionConfidence: 0.7, 
            minTrackingConfidence: 0.7 
        });
        
        hands.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            let handDetectedThisFrame = false;

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    handDetectedThisFrame = true;

                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#00FF00', lineWidth: 1, radius: 3});

                    const thumb = landmarks[4];
                    const indexFinger = landmarks[8];

                    // --- CORRECCIÓN MATEMÁTICA DEL ESPEJO ---
                    // Invertimos el cálculo en JS para emparejarlo con el transform: scaleX(-1) de CSS
                    const thumbX = window.innerWidth - (thumb.x * window.innerWidth);
                    const thumbY = thumb.y * window.innerHeight;
                    const indexX = window.innerWidth - (indexFinger.x * window.innerWidth);
                    const indexY = indexFinger.y * window.innerHeight;

                    const distancia = Math.sqrt(Math.pow(indexX - thumbX, 2) + Math.pow(indexY - thumbY, 2));
                    const pointerX = (thumbX + indexX) / 2;
                    const pointerY = (thumbY + indexY) / 2;

                    // Dibujar indicador de pinza
                    canvasCtx.beginPath();
                    canvasCtx.arc(pointerX, pointerY, 8, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = distancia < 45 ? '#00FF00' : '#FF0000';
                    canvasCtx.fill();

                    // --- DETECCIÓN DE INTERACCIÓN ---
                    if (distancia < 45) {
                        
                        // 1. COMPROBAR BOTONES FLOTANTES
                        const addBtn = document.getElementById('addBtn');
                        const removeBtn = document.getElementById('removeBtn');
                        const rAdd = addBtn.getBoundingClientRect();
                        const rRem = removeBtn.getBoundingClientRect();

                        // Pinza sobre botón Añadir
                        if (pointerX >= rAdd.left && pointerX <= rAdd.right && pointerY >= rAdd.top && pointerY <= rAdd.bottom) {
                            addBtn.classList.add('pressed');
                            if (!buttonCooldown) {
                                crearVentana();
                                buttonCooldown = true;
                            }
                            continue; // Saltar lógica de ventanas si interactúa con botones
                        }
                        
                        // Pinza sobre botón Eliminar
                        if (pointerX >= rRem.left && pointerX <= rRem.right && pointerY >= rRem.top && pointerY <= rRem.bottom) {
                            removeBtn.classList.add('pressed');
                            if (!buttonCooldown) {
                                eliminarVentana();
                                buttonCooldown = true;
                            }
                            continue;
                        }

                        // 2. LOGICA DE ARRASTRE DE VENTANAS (Si no está sobre botones)
                        if (!activeHoldingWindow) {
                            const windows = document.querySelectorAll('.window');
                            
                            for (let i = windows.length - 1; i >= 0; i--) {
                                const win = windows[i];
                                const rect = win.getBoundingClientRect();

                                if (pointerX >= rect.left && pointerX <= rect.right &&
                                    pointerY >= rect.top && pointerY <= rect.bottom) {
                                    
                                    activeHoldingWindow = win;
                                    win.classList.add('holding');
                                    offsetX = pointerX - rect.left;
                                    offsetY = pointerY - rect.top;
                                    break;
                                }
                            }
                        } else {
                            // Mover ventana activa
                            activeHoldingWindow.style.left = `${pointerX - offsetX}px`;
                            activeHoldingWindow.style.top = `${pointerY - offsetY}px`;
                        }

                    } else {
                        // Soltar todo al abrir los dedos
                        if (activeHoldingWindow) {
                            activeHoldingWindow.classList.remove('holding');
                            activeHoldingWindow = null;
                        }
                        document.getElementById('addBtn').classList.remove('pressed');
                        document.getElementById('removeBtn').classList.remove('pressed');
                        buttonCooldown = false; // Resetear enfriamiento de botones
                    }
                }
            }

            if (!handDetectedThisFrame) {
                if (activeHoldingWindow) {
                    activeHoldingWindow.classList.remove('holding');
                    activeHoldingWindow = null;
                }
                document.getElementById('addBtn').classList.remove('pressed');
                document.getElementById('removeBtn').classList.remove('pressed');
                buttonCooldown = false;
            }

            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
